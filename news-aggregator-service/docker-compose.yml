services:
  news-aggregator:
    build: .
    env_file:
      - .env
    container_name: news-aggregator-service
    ports:
      - "${PORT:-5008}:5008"
    environment:
      - PPLX_API_KEY=${PPLX_API_KEY}
      - MODEL=${MODEL}
      - LLM_PROVIDER=${LLM_PROVIDER}
      - AGGREGATOR_BASE_URL=${AGGREGATOR_BASE_URL}
      - NEWS_ANALYSIS_QDRANT_URL=${NEWS_ANALYSIS_QDRANT_URL}
      - REDIS_AGGREGATOR_STREAM=${REDIS_AGGREGATOR_STREAM}
      - REDIS_NEWS_STREAM=${REDIS_NEWS_STREAM}
      - REDIS_SIGNAL_STREAM=${REDIS_SIGNAL_STREAM}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_SERVICE_CONTROL_KEY=${REDIS_SERVICE_CONTROL_KEY}
      - PORT=${PORT:-5008}
    command: uvicorn src.main:app --host 0.0.0.0 --port 5008
    restart: unless-stopped