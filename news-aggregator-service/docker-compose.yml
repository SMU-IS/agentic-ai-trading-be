services:
  news-aggregator:
    build: .
    env_file:
      - .env
    container_name: news-aggregator-service
    ports:
      - "${PORT:-5008}:5008"
    environment:
      - PPLX_API_KEY=${PPLX_API_KEY}
      - QDRANT_URL=${QDRANT_URL}
      - QDRANT_API_KEY=${QDRANT_API_KEY}
      - QDRANT_NEWS_COLLECTION=${QDRANT_NEWS_COLLECTION}
      - AGGREGATOR_BASE_URL=${AGGREGATOR_BASE_URL}
      - REDIS_AGGREGATOR_STREAM=${REDIS_AGGREGATOR_STREAM}
      - REDIS_NEWS_STREAM=${REDIS_NEWS_STREAM}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - PORT=${PORT:-5008}
    command: uvicorn src.main:app --host 0.0.0.0 --port 5008
    restart: unless-stopped