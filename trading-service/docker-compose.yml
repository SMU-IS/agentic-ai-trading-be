services:
  broker-service:
    build: .
    env_file:
      - .env
    container_name: alpaca-broker-service
    ports:
      - "5007:5007"
    environment:
      FLASK_ENV: production
      MONGODB_URL: ${MONGODB_URL}
    command: uvicorn app.main:app --host 0.0.0.0 --port 5007
    restart: unless-stopped
