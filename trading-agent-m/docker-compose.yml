services:
  trading-agent-m-service:
    build: .
    container_name: trading-agent-m-container
    env_file:
      - .env
    ports:
      - "5006:5006"
    volumes:
      - .:/code
    environment:
      # Redis
      - REDIS_HOST=${REDIS_HOST:-localhost}
      - REDIS_PORT=${REDIS_PORT:-17989}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-password}
      - REDIS_SIGNAL_STREAM=${REDIS_SIGNAL_STREAM:-trading_signals}

      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY}
      - PERPLEXITY_MODEL=${PERPLEXITY_MODEL:-sonar}
      - PERPLEXITY_TEMPERATURE=${PERPLEXITY_TEMPERATURE:-0.2}

      # Trading APIs (NEW)
      - TRADING_SERVICE_URL=${TRADING_SERVICE_URL:-http://localhost:8000/api/v1/trading}

    command: uvicorn app.main:app --host 0.0.0.0 --port 5006
