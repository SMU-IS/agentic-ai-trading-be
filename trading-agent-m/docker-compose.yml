services:
  trading-agent-m-service:
    build: .
    container_name: trading-agent-m-container
    ports:
      - "5003:5003"
    volumes:
      - .:/code
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - LARGE_LANGUAGE_MODEL=${LARGE_LANGUAGE_MODEL}
      - OPEN_AI_API_KEY=${OPEN_AI_API_KEY}
      - TEMPERATURE=${TEMPERATURE}
      # - REDIS_URL=${REDIS_URL}
      # - REDIS_STREAM_KEY=${REDIS_STREAM_KEY}
      # - REDIS_GROUP_NAME=${REDIS_GROUP_NAME}
      # - REDIS_WORKER_NAME=${REDIS_WORKER_NAME}
      # - QDRANT_URL=${QDRANT_URL}
      - ALPACA_BASE_URL=${ALPACA_BASE_URL}
      - YAHOO_BASE_URL=${YAHOO_BASE_URL}
    command: fastapi dev app/main.py --host 0.0.0.0 --port 5003
