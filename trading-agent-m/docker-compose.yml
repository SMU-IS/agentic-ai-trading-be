services:
  trading-agent-m-service:
    build: .
    env_file:
      - .env
    container_name: trading-agent-m-container
    ports:
      - "5006:5006"
    volumes:
      - .:/code
    environment:
        # Redis
        - REDIS_HOST=${REDIS_HOST}
        - REDIS_PORT=${REDIS_PORT}
        - REDIS_PASSWORD=${REDIS_PASSWORD}
        - REDIS_SIGNAL_STREAM=${REDIS_SIGNAL_STREAM}
        
        # Perplexity (NEW)
        - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY}
        - PERPLEXITY_MODEL=${PERPLEXITY_MODEL}
        - PERPLEXITY_TEMPERATURE=${PERPLEXITY_TEMPERATURE}
        
        # Trading APIs (NEW)
        - TRADING_SERVICE_URL=${TRADING_SERVICE_URL}
        
    command: uvicorn app.main:app --host 0.0.0.0 --port 5006 --reload
