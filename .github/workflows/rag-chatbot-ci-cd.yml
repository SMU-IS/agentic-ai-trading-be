name: RAG Chatbot CI

on:
  workflow_dispatch:
  push:
    branches: ["master"]
    paths:
      - "rag-chatbot/**"
  pull_request:
    branches: ["master"]
    paths:
      - "rag-chatbot/**"

jobs:
  python-tests:
    name: Continuous Integration
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rag-chatbot
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "rag-chatbot/uv.lock"

      - name: Set up Python
        run: uv python install 3.12.9

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run Linting
        run: uvx ruff check .

      - name: Run Tests
        run: |
          if [ -d "tests" ]; then
            uv run pytest -v --maxfail=2 --durations=10 --html=report.html --self-contained-html
          else
            echo "No tests folder found, skipping...";
          fi

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: rag-chatbot/report.html

  deploy:
    name: Continuous Deployment
    if: true
    runs-on: ubuntu-latest
    needs: python-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR Repository exists
        run: |
          aws ecr describe-repositories --repository-names rag-chatbot || \
          aws ecr create-repository --repository-name rag-chatbot

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: rag-chatbot
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build --platform linux/arm64 -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -f ./rag-chatbot/Dockerfile ./rag-chatbot
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Update Kubeconfig
        run: aws eks update-kubeconfig --region us-east-1 --name agentic-m-cluster

      - name: Create K8s Secret from RAG_CHATBOT_SECRETS
        run: |
          echo "${{ secrets.RAG_CHATBOT_SECRETS }}" > .env.tmp

          kubectl create secret generic rag-chatbot-secrets \
            --from-env-file=.env.tmp \
            --dry-run=client -o yaml | kubectl apply -f -

          rm .env.tmp

      - name: Deploy to AWS EKS
        env:
          WORKSPACE: ${{ github.workspace }}
        run: |
          helm upgrade --install rag-chatbot ./infra -f ./deploy/values-chatbot.yaml --set image.tag=${{ github.sha }} --set ingress.enabled=true

      - name: Verify Health and Status
        if: always()
        run: |
          echo "****** Helm Release Status ******"
          helm status rag-chatbot

          echo "****** Deployment Revision History ******"
          helm history rag-chatbot

          echo "****** Kubernetes Pod Status ******"
          kubectl get pods -l app.kubernetes.io/instance=rag-chatbot

      - name: Apply Global Ingress Gateway
        run: |
          kubectl apply -f ./deploy/ingress.yaml
