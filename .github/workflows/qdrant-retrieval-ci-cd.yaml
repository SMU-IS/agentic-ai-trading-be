name: Qdrant Retrieval CI/CD Pipeline

on:
  workflow_dispatch:
    inputs:
      skip-approval:
        description: "Bypass manual approval"
        required: false
        default: "false"
  push:
    branches: ["master", "dev"]
    paths:
      - "qdrant-retrieval/**"
      - "deploy/**"
      - "infra/**"
      - ".github/workflows/python-reusable-workflow.yaml"
  pull_request:
    branches: ["master", "dev"]
    paths:
      - "qdrant-retrieval/**"
      - "deploy/**"
      - "infra/**"
      - ".github/workflows/python-reusable-workflow.yaml"
jobs:
  qdrant-retrieval-workflow:
    uses: ./.github/workflows/python-reusable-workflow.yaml
    with:
      working-directory: "qdrant-retrieval"
      cluster-name: "agentic-m-cluster"
      image-name: "qdrant-retrieval"
      skip-approval: ${{ inputs.skip-approval || 'false' }}
      values-file: "deploy/prod/values-qdrant-retrieval.yaml"
      secret-key: "QDRANT_RETRIEVAL_SECRETS"
    secrets: inherit