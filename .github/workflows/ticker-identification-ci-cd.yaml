name: Ticker Identification Service CI/CD Pipeline

on:
  workflow_dispatch:
  push:
    branches: ["master"]
    paths: ["ticker-identification-service/**"]
  pull_request:
    branches: ["master"]
    paths: ["ticker-identification-service/**"]

jobs:
  rag-bot-workflow:
    uses: ./.github/workflows/python-reusable-workflow.yaml
    with:
      working-directory: "ticker-identification-service"
      cluster-name: "agentic-m-cluster"
      image-name: "ticker-identification-service"
      values-file: "deploy/values-ticker-identification.yaml"
      ingress-path: "deploy/ingress.yaml"
      secret-key: "TICKER_IDENTIFICATION_SECRETS"
    secrets: inherit
