name: Python Reusable CI/CD Workflow

on:
  workflow_call:
    inputs:
      working-directory:
        required: true
        type: string
      cluster-name:
        required: true
        type: string
      image-name:
        required: true
        type: string
      values-file:
        required: true
        type: string
      chart-path:
        required: false
        type: string
        default: "./infra"
      secret-key:
        required: true
        type: string
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Run Tests
        if: inputs.image-name == 'rag-chatbot'
        run: |
          uv python install 3.12.9
          uv sync --frozen
          uvx ruff check .
          if [ -d "tests" ]; then uv run pytest -v; fi

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - uses: docker/build-push-action@v6
        with:
          context: ./${{ inputs.working-directory }}
          file: ./${{ inputs.working-directory }}/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/${{ inputs.image-name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: [test, build]
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - run: aws eks update-kubeconfig --region us-east-1 --name ${{ inputs.cluster-name }}

      - name: Deploy to EKS
        run: |
          # Use the generic secret passed from the caller
          echo "${{ secrets[inputs.secret-key] }}" > .env.tmp
          kubectl create secret generic ${{ inputs.image-name }}-secrets \
            --from-env-file=.env.tmp \
            --dry-run=client -o yaml | kubectl apply -f -
          rm .env.tmp

          helm upgrade --install ${{ inputs.image-name }} ${{ inputs.chart-path }} \
            -f ${{ inputs.values-file }} \
            --set image.tag=${{ github.sha }} \
            --wait --timeout 10m \
            --atomic \
            --cleanup-on-fail

      - name: Verify Rollout
        run: |
          DEPLOY_NAME=$(kubectl get deployment -l app.kubernetes.io/instance=${{ inputs.image-name }} -o name)
          if [ -n "$DEPLOY_NAME" ]; then
            kubectl rollout status $DEPLOY_NAME --timeout=120s
          else
            echo "Deployment not found, checking pods..."
            kubectl get pods -l app.kubernetes.io/instance=${{ inputs.image-name }}
          fi
