name: Agent M FastAPI Reusable CI/CD Workflow

on:
  workflow_call:
    inputs:
      working-directory:
        required: true
        type: string
      cluster-name:
        required: true
        type: string
      image-name:
        required: true
        type: string
      values-file:
        required: true
        type: string
      chart-path:
        required: false
        type: string
        default: "./infra"
      secret-key:
        required: true
        type: string
      k8s-secret-name:
        required: false
        type: string
        default: ""
      skip-approval:
        required: false
        type: string
        default: "false"
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Run Tests
        if: inputs.image-name == 'rag-chatbot'
        run: |
          # Check if uv is the intended package manager
          if [ -f "uv.lock" ]; then
            echo "⚡ Detected uv project..."
            uv python install 3.12.9
            uv sync --frozen
            uv pip install pytest-cov
            uv run pytest --cov=. --cov-report=html --cov-fail-under=80 -v
          elif [ -f "requirements.txt" ]; then
            echo "📦 Detected standard pip project..."
            python -m pip install --upgrade pip
            pip install -r requirements.txt
            pip install pytest pytest-cov # Ensure test tools are installed
            pytest --cov=. --cov-report=html --cov-fail-under=80 -v
          else
            echo "❓No recognized dependency file found. Running pytest with system python..."
            pytest --cov=. --cov-report=html --cov-fail-under=80 -v
          fi
      - name: Upload Coverage Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.image-name }}-coverage-report
          path: ${{ inputs.working-directory }}/htmlcov/

  build:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - uses: docker/build-push-action@v6
        with:
          context: ./${{ inputs.working-directory }}
          file: ./${{ inputs.working-directory }}/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/${{ inputs.image-name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: [test, build]
    # Trigger deployment on any push to dev or master
    # Or if skip-approval is explicitly requested (from Global workflow)
    if: |
      github.ref_name == 'master' || 
      github.ref_name == 'dev' || 
      inputs.skip-approval == 'true'
    environment:
      # Use production environment for master branch to enforce manual approval
      # Unless skip-approval is true (Global workflow)
      name: ${{ (github.ref_name == 'master' && inputs.skip-approval != 'true') && 'production' || 'development' }}
    env:
      # Use branch name or inputs to force the environment variables
      TARGET_NAMESPACE: ${{ (github.ref_name == 'master' || inputs.skip-approval == 'true') && 'production' || 'development' }}
      TARGET_RELEASE: ${{ (github.ref_name == 'master' || inputs.skip-approval == 'true') && inputs.image-name || format('{0}-dev', inputs.image-name) }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - run: aws eks update-kubeconfig --region us-east-1 --name ${{ inputs.cluster-name }}

      - name: Ensure Namespace Exists
        run: kubectl create namespace ${{ env.TARGET_NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to EKS
        run: |
          # Determine the Secret Name to use in K8s
          SECRET_NAME="${{ inputs.k8s-secret-name }}"
          if [ -z "$SECRET_NAME" ]; then
            SECRET_NAME="${{ inputs.image-name }}"
          fi

          # Use the generic secret passed from the caller
          echo "${{ secrets[inputs.secret-key] }}" > .env.tmp
          kubectl create secret generic ${SECRET_NAME}-secrets \
            --from-env-file=.env.tmp \
            --namespace ${{ env.TARGET_NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -
          rm .env.tmp

          # Determine values files
          VALUES_FLAGS="-f ${{ inputs.values-file }}"
          DEV_VALUES_FILE=$(echo "${{ inputs.values-file }}" | sed 's/prod\//dev\//')

          # If on dev branch, add the dev override
          if [[ "${{ github.ref_name }}" == "dev" ]] && [[ -f "$DEV_VALUES_FILE" ]]; then
            VALUES_FLAGS="$VALUES_FLAGS -f $DEV_VALUES_FILE"
          fi

          helm upgrade --install ${{ env.TARGET_RELEASE }} ${{ inputs.chart-path }} \
            --namespace ${{ env.TARGET_NAMESPACE }} \
            $VALUES_FLAGS \
            --set image.tag=${{ github.sha }} \
            --wait --timeout 10m \
            --atomic \
            --cleanup-on-fail

      - name: Verify Rollout
        run: |
          DEPLOY_NAME=$(kubectl get deployment -n ${{ env.TARGET_NAMESPACE }} -l app.kubernetes.io/instance=${{ env.TARGET_RELEASE }} -o name)
          if [ -n "$DEPLOY_NAME" ]; then
            kubectl rollout status $DEPLOY_NAME -n ${{ env.TARGET_NAMESPACE }} --timeout=120s
          else
            echo "Deployment not found, checking pods..."
            kubectl get pods -n ${{ env.TARGET_NAMESPACE }} -l app.kubernetes.io/instance=${{ env.TARGET_RELEASE }}
          fi
