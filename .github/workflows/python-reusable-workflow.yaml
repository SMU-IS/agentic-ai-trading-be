name: Python Reusable Workflow

on:
  workflow_call:
    inputs:
      working-directory:
        required: true
        type: string
      cluster-name:
        required: true
        type: string
      image-name:
        required: true
        type: string
      values-file:
        required: false
        type: string
        default: "deploy/values-chatbot.yaml"
      ingress-path:
        required: false
        type: string
        default: "deploy/ingress.yaml"
      chart-path:
        required: false
        type: string
        default: "./infra"
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      RAG_CHATBOT_SECRETS:
        required: true

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "${{ inputs.working-directory }}/uv.lock"
      - name: Run Tests
        run: |
          uv python install 3.12.9
          uv sync --frozen
          uvx ruff check .
          if [ -d "tests" ]; then
            uv run pytest -v
          fi

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: ./${{ inputs.working-directory }}
          file: ./${{ inputs.working-directory }}/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/${{ inputs.image-name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: [test, build] # Only runs if both Test and Build succeed
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - name: Update Kubeconfig
        run: aws eks update-kubeconfig --region us-east-1 --name ${{ inputs.cluster-name }}
      - name: Deploy to EKS
        run: |
          echo "${{ secrets.RAG_CHATBOT_SECRETS }}" > .env.tmp
          kubectl create secret generic ${{ inputs.image-name }}-secrets \
            --from-env-file=.env.tmp \
            --dry-run=client -o yaml | kubectl apply -f -
          rm .env.tmp

          helm upgrade --install ${{ inputs.image-name }} ${{ inputs.chart-path }} \
            -f ${{ inputs.values-file }} \
            --set image.tag=${{ github.sha }} \
            --wait --timeout 10m

          # Final Health Check
          kubectl rollout status deployment/${{ inputs.image-name }}
      - name: Apply Ingress
        run: |
          if [ -f "${{ inputs.ingress-path }}" ]; then
            kubectl apply -f ${{ inputs.ingress-path }}
          fi
