name: Sentiment Analysis Service CI/CD Pipeline

on:
  workflow_dispatch:
  push:
    branches: ["master"]
    paths: ["sentiment-analysis-service/**"]
  pull_request:
    branches: ["master"]
    paths: ["sentiment-analysis-service/**"]

jobs:
  sentiment-analysis-service-workflow:
    uses: ./.github/workflows/python-reusable-workflow.yaml
    with:
      working-directory: "sentiment-analysis-service"
      cluster-name: "agentic-m-cluster"
      image-name: "sentiment-analysis-service"
      values-file: "deploy/values-sentiment-analysis.yaml"
      ingress-path: "deploy/ingress.yaml"
      secret-key: "SENTIMENT_ANALYSIS_SECRETS"
    secrets: inherit
