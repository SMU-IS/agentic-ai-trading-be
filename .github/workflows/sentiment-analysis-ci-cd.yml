name: Sentiment Analysis Service CI/CD Pipeline

on:
  workflow_dispatch:
    inputs:
      skip-approval:
        description: "Bypass manual approval"
        required: false
        default: "false"
  push:
    branches: ["master", "dev"]
    paths:
      - "sentiment-analysis-service/**"
      - "deploy/**"
      - "infra/**"
      - ".github/workflows/python-reusable-workflow.yaml"
  pull_request:
    branches: ["master", "dev"]
    paths:
      - "sentiment-analysis-service/**"
      - "deploy/**"
      - "infra/**"
      - ".github/workflows/python-reusable-workflow.yaml"
jobs:
  sentiment-analysis-service-workflow:
    uses: ./.github/workflows/python-reusable-workflow.yaml
    with:
      working-directory: "sentiment-analysis-service"
      cluster-name: "agentic-m-cluster"
      image-name: "sentiment-analysis-service"
      skip-approval: ${{ inputs.skip-approval || 'false' }}
      values-file: "deploy/prod/values-sentiment-analysis.yaml"
      secret-key: "SENTIMENT_ANALYSIS_SECRETS"
      k8s-secret-name: "sentiment-analysis"
    secrets: inherit
