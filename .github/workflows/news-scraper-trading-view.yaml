name: News Scraper Trading View CI/CD Pipeline

on:
  workflow_dispatch:
    inputs:
      skip-approval:
        description: "Bypass manual approval"
        required: false
        default: "false"
  push:
    branches: ["master", "dev"]
    paths:
      - "news-scraper-tradingview/**"
      - "deploy/**"
      - "infra/**"
      - ".github/workflows/python-reusable-workflow.yaml"
  pull_request:
    branches: ["master", "dev"]
    paths:
      - "news-scraper-tradingview/**"
      - "deploy/**"
      - "infra/**"
      - ".github/workflows/python-reusable-workflow.yaml"

jobs:
  trading-view-scraper-workflow:
    uses: ./.github/workflows/python-reusable-workflow.yaml
    with:
      working-directory: "news-scraper-tradingview"
      cluster-name: "agentic-m-cluster"
      image-name: "news-scraper-tradingview"
      skip-approval: ${{ inputs.skip-approval || 'false' }}
      values-file: "deploy/prod/values-trading-view.yaml"
      secret-key: "NEWS_SCRAPER_TRADING_VIEW_SECRETS"
      k8s-secret-name: "news-scraper-trading-view"
    secrets: inherit
