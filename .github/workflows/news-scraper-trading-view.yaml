name: News Scraper Trading View CI/CD Pipeline

on:
  workflow_dispatch:
  push:
    branches: ["master"]
    paths: ["news-scraping-tradingview/**"]
  pull_request:
    branches: ["master"]
    paths: ["news-scraping-tradingview/**"]

jobs:
  rag-bot-workflow:
    uses: ./.github/workflows/python-reusable-workflow.yaml
    with:
      working-directory: "news-scraping-tradingview"
      cluster-name: "agentic-m-cluster"
      image-name: "news-scraping-tradingview"
      values-file: "deploy/values-trading-view.yaml"
      ingress-path: "deploy/ingress.yaml"
      secret-key: "NEWS_SCRAPER_TRADING_VIEW_SECRETS"
    secrets: inherit
