name: Trading Service CI/CD Pipeline

on:
  workflow_dispatch:
  push:
    branches: ["master"]
    paths: ["trading-service/**"]
  pull_request:
    branches: ["master"]
    paths: ["trading-service/**"]

jobs:
  trading-service-workflow:
    uses: ./.github/workflows/python-reusable-workflow.yaml
    with:
      working-directory: "trading-service"
      cluster-name: "agentic-m-cluster"
      image-name: "trading-service"
      values-file: "deploy/values-trading-service.yaml"
      ingress-path: "deploy/ingress.yaml"
      secret-key: "TRADING_SERVICE_SECRETS"
    secrets: inherit
