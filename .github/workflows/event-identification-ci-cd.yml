name: Event Identification Service CI

on:
  workflow_dispatch:
  push:
    branches: ["master"]
    paths:
      - "event-identification-service/**"
  pull_request:
    branches: ["master"]
    paths:
      - "event-identification-service/**"

jobs:
  python-tests:
    name: Continuous Integration
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: event-identification-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.9"
          cache: "pip"
          cache-dependency-path: event-identification-service/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Linting (Optional)
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run Tests
        run: |
          if [ -d "tests" ]; then python -m pytest; else echo "No tests folder found, skipping..."; fi

  deploy:
    name: Continuous Deployment
    if: false
    runs-on: ubuntu-latest
    needs: python-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR Repository exists
        run: |
          aws ecr describe-repositories --repository-names event-identification-service ||
          aws ecr create-repository --repository-name event-identification-service

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: event-identification-service
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build --platform linux/arm64 -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -f ./event-identification-service/Dockerfile ./event-identification-service
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Update Kubeconfig
        run: aws eks update-kubeconfig --region us-east-1 --name agentic-m-cluster

      - name: Create K8s Secret from EVENT_IDENTIFICATION_SECRETS
        run: |
          echo "${{ secrets.EVENT_IDENTIFICATION_SECRETS }}" > .env.tmp

          kubectl create secret generic event-identification-secrets \
            --from-env-file=.env.tmp \
            --dry-run=client -o yaml | kubectl apply -f -

          rm .env.tmp

      - name: Deploy to AWS EKS
        env:
          WORKSPACE: ${{ github.workspace }}
        run: |
          helm upgrade --install event-identification-service ./infra -f ./deploy/values-event-identification.yaml --set image.tag=${{ github.sha }} --set ingress.enabled=true

      - name: Verify Health and Status
        if: always()
        run: |
          echo "****** Helm Release Status ******"
          helm status event-identification-service

          echo "****** Deployment Revision History ******"
          helm history event-identification-service

          echo "****** Kubernetes Pod Status ******"
          kubectl get pods -l app.kubernetes.io/instance=event-identification-service

      - name: Apply Global Ingress Gateway
        run: |
          kubectl apply -f ./deploy/ingress.yaml
