name: News Scraper CI/CD Pipeline

on:
  workflow_dispatch:
  push:
    branches: ["master", "dev"]
    paths:
      - "news-scraper/**"
      - "deploy/**"
      - "infra/**"
      - ".github/workflows/python-reusable-workflow.yaml"
  pull_request:
    branches: ["dev"]
    paths:
      - "news-scraper/**"
      - "deploy/**"
      - "infra/**"
      - ".github/workflows/python-reusable-workflow.yaml"
jobs:
  news-scraper-workflow:
    uses: ./.github/workflows/python-reusable-workflow.yaml
    with:
      working-directory: "news-scraper"
      cluster-name: "agentic-m-cluster"
      image-name: "news-scraper"
      values-file: "deploy/prod/values-news-scraper.yaml"
      secret-key: "NEWS_SCRAPER_SECRETS"
    secrets: inherit