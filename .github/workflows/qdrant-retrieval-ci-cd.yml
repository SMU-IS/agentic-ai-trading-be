name: Qdrant Retrieval CI

on:
  workflow_dispatch:
#   push:
#     branches: ["master"]
#     paths:
#       - "qdrant-retrieval/**"
#   pull_request:
#     branches: ["master"]
#     paths:
#       - "qdrant-retrieval/**"

jobs:
  python-tests:
    name: Continuous Integration
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: qdrant-retrieval
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.9"
          cache: "pip"
          cache-dependency-path: qdrant-retrieval/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Linting (Optional)
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run Tests
        run: |
          if [ -d "tests" ]; then python -m pytest; else echo "No tests folder found, skipping..."; fi

  deploy:
    name: Continuous Deployment
    runs-on: ubuntu-latest
    needs: python-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR Repository exists
        run: |
          aws ecr describe-repositories --repository-names qdrant-retrieval || \
          aws ecr create-repository --repository-name qdrant-retrieval

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: qdrant-retrieval
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -f ./qdrant-retrieval/Dockerfile ./qdrant-retrieval
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Update Kubeconfig
        run: aws eks update-kubeconfig --region us-east-1 --name agentic-m-cluster

      - name: Create K8s Secret from QDRANT_RETRIEVAL_SECRETS
        run: |
          echo "${{ secrets.QDRANT_RETRIEVAL_SECRETS }}" > .env.tmp

          kubectl create secret generic qdrant-retrieval-secrets \
            --from-env-file=.env.tmp \
            --dry-run=client -o yaml | kubectl apply -f -

          rm .env.tmp

      - name: Deploy to AWS EKS
        env:
          WORKSPACE: ${{ github.workspace }}
        run: |
          helm upgrade --install qdrant-retrieval ./infra -f ./deploy/values-qdrant-retrieval.yaml --set image.tag=${{ github.sha }}

      - name: Verify Health and Status
        if: always()
        run: |
          echo "****** Helm Release Status ******"
          helm status qdrant-retrieval

          echo "****** Deployment Revision History ******"
          helm history qdrant-retrieval

          echo "****** Kubernetes Pod Status ******"
          kubectl get pods -l app.kubernetes.io/instance=qdrant-retrieval    

      - name: Apply Global Ingress Gateway
        run: |
          kubectl apply -f ./deploy/ingress.yaml
