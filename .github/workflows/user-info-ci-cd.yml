on:
  workflow_dispatch:
  push:
    branches: ["master", "dev"]
    paths:
      - "user-info/**"
      - "deploy/**"
      - "infra/**"
      - ".github/workflows/python-reusable-workflow.yaml"
  pull_request:
    branches: ["dev"]
    paths:
      - "user-info/**"
      - "deploy/**"
      - "infra/**"
      - ".github/workflows/python-reusable-workflow.yaml"

jobs:
  go-tests:
    name: Continuous Integration
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: user-info
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
          cache-dependency-path: user-info/go.sum

      - name: Run Unit Tests
        run: go test -v ./...

  deploy:
    name: Continuous Deployment
    runs-on: ubuntu-latest
    needs: go-tests
    if: |
      (github.event_name == 'workflow_dispatch' && github.ref_name == 'master') || 
      (github.event_name == 'push' && github.ref_name == 'dev')
    environment:
      name: ${{ github.ref_name == 'master' && 'production' || 'development' }}
    env:
      RELEASE_NAME: ${{ github.ref_name == 'dev' && 'user-info-dev' || 'user-info' }}
      NAMESPACE: ${{ github.ref_name == 'dev' && 'development' || 'production' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push to ECR
        uses: docker/build-push-action@v5
        with:
          context: ./user-info
          file: ./user-info/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/user-info:${{ github.sha }}
          build-args: |
            TARGETARCH=arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Kubeconfig
        run: aws eks update-kubeconfig --region us-east-1 --name agentic-m-cluster

      - name: Ensure Namespace Exists
        run: kubectl create namespace ${{ env.NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

      - name: Create K8s Secret
        run: |
          echo "${{ secrets.USER_INFO_SECRETS }}" > .env.tmp
          kubectl create secret generic user-info-secrets \
            --from-env-file=.env.tmp \
            --namespace ${{ env.NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -
          rm .env.tmp

      - name: Deploy to AWS EKS
        run: |
          VALUES_FLAGS="-f ./deploy/prod/values-user-info.yaml"
          if [[ "${{ github.ref_name }}" == "dev" ]]; then
            VALUES_FLAGS="$VALUES_FLAGS -f ./deploy/dev/values-user-info.yaml"
          fi

          helm upgrade --install ${{ env.RELEASE_NAME }} ./infra \
            --namespace ${{ env.NAMESPACE }} \
            $VALUES_FLAGS \
            --set image.tag=${{ github.sha }} \
            --set ingress.enabled=true \
            --atomic \
            --cleanup-on-fail
