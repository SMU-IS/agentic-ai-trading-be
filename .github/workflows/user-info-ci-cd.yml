name: User Info Service CI

on:
  workflow_dispatch:
  push:
    branches: ["master", "dev"]
    paths:
      - "user-info/**"
  pull_request:
    branches: ["dev"]
    paths:
      - "user-info/**"

jobs:
  go-tests:
    name: Continuous Integration
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: user-info
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
          cache-dependency-path: user-info/go.sum

      - name: Run Unit Tests
        run: go test -v ./...

  deploy:
    name: Continuous Deployment
    runs-on: ubuntu-latest
    needs: go-tests
    if: |
      (github.event_name == 'workflow_dispatch' && github.ref_name == 'master') || 
      (github.event_name == 'push' && github.ref_name == 'dev')
    environment:
      name: ${{ github.ref_name == 'master' && 'production' || 'development' }}
    env:
      RELEASE_NAME: ${{ github.ref_name == 'dev' && 'user-info-dev' || 'user-info' }}
      NAMESPACE: ${{ github.ref_name == 'dev' && 'development' || 'production' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push to ECR
        uses: docker/build-push-action@v5
        with:
          context: ./user-info
          file: ./user-info/Dockerfile
          platforms: linux/arm64
  push:
    branches: ["master", "dev"]
    paths:
