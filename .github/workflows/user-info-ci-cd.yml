name: User Info Service CI

on:
  workflow_dispatch:
  push:
    branches: ["master"]
    paths:
      - "user-info/**"
  pull_request:
    branches: ["master"]
    paths:
      - "user-info/**"

jobs:
  go-tests:
    name: Continuous Integration
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: user-info

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go Environment
        uses: actions/setup-go@v4
        with:
          go-version: "1.25.x"
          cache: true
          cache-dependency-path: user-info/go.sum

      - name: Install dependencies
        run: go mod download

      - name: Run Unit Tests
        run: go test -v ./...

      - name: Verify Binary Compilation
        run: go build -v -o app ./cmd/main.go

  deploy:
    name: Continuous Deployment
    if: false
    runs-on: ubuntu-latest
    needs: go-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR Repository exists
        run: |
          aws ecr describe-repositories --repository-names user-info || \
          aws ecr create-repository --repository-name user-info

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: user-info
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build --platform linux/arm64 -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -f ./user-info/Dockerfile ./user-info
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Update Kubeconfig
        run: aws eks update-kubeconfig --region us-east-1 --name agentic-m-cluster

      - name: Create K8s Secret from USER_INFO_SECRETS
        run: |
          echo "${{ secrets.USER_INFO_SECRETS }}" > .env.tmp

          kubectl create secret generic user-info-secrets \
            --from-env-file=.env.tmp \
            --dry-run=client -o yaml | kubectl apply -f -

          rm .env.tmp

      - name: Deploy to AWS EKS
        env:
          WORKSPACE: ${{ github.workspace }}
        run: |
          helm upgrade --install user-info ./infra -f ./deploy/values-user-info.yaml --set image.tag=${{ github.sha }} --set ingress.enabled=true

      - name: Verify Health and Status
        if: always()
        run: |
          echo "****** Helm Release Status ******"
          helm status user-info

          echo "****** Deployment Revision History ******"
          helm history user-info

          echo "****** Kubernetes Pod Status ******"
          kubectl get pods -l app.kubernetes.io/instance=user-info

      - name: Apply Global Ingress Gateway
        run: |
          kubectl apply -f ./deploy/ingress.yaml
