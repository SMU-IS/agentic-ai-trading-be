name: User Info Service CI

on:
  workflow_dispatch:
  push:
    branches: ["master"]
    paths:
      - "user-info/**"
  pull_request:
    branches: ["master"]
    paths:
      - "user-info/**"

jobs:
  go-tests:
    name: Continuous Integration
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: user-info
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
          cache-dependency-path: user-info/go.sum

      - name: Run Unit Tests
        run: go test -v ./...

  deploy:
    name: Continuous Deployment
    runs-on: ubuntu-latest
    needs: go-tests
    if: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push to ECR
        uses: docker/build-push-action@v5
        with:
          context: ./user-info
          file: ./user-info/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/user-info:${{ github.sha }}
          build-args: |
            TARGETARCH=arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Kubeconfig
        run: aws eks update-kubeconfig --region us-east-1 --name agentic-m-cluster

      - name: Create K8s Secret
        run: |
          echo "${{ secrets.USER_INFO_SECRETS }}" > .env.tmp
          kubectl create secret generic user-info-secrets \
            --from-env-file=.env.tmp \
            --dry-run=client -o yaml | kubectl apply -f -
          rm .env.tmp

      - name: Deploy to AWS EKS
        run: |
          helm upgrade --install user-info ./infra \
            -f ./deploy/values-user-info.yaml \
            --set image.tag=${{ github.sha }} \
            --set ingress.enabled=true \
            --atomic \
            --cleanup-on-fail
