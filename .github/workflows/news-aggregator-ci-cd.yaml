name: News Aggregator CI/CD Pipeline

on:
  workflow_dispatch:
    inputs:
      skip-approval:
        description: "Bypass manual approval"
        required: false
        default: "false"
  push:
    branches: ["master", "dev"]
    paths:
      - "news-aggregator-service/**"
      - "deploy/**"
      - "infra/**"
      - ".github/workflows/python-reusable-workflow.yaml"
  pull_request:
    branches: ["master", "dev"]
    paths:
      - "news-aggregator-service/**"
      - "deploy/**"
      - "infra/**"
      - ".github/workflows/python-reusable-workflow.yaml"
jobs:
  news-aggregator-workflow:
    uses: ./.github/workflows/python-reusable-workflow.yaml
    with:
      working-directory: "news-aggregator-service"
      cluster-name: "agentic-m-cluster"
      image-name: "news-aggregator-service"
      skip-approval: ${{ inputs.skip-approval || 'false' }}
      values-file: "deploy/prod/values-news-aggregator.yaml"
      secret-key: "NEWS_AGGREGATOR_SECRETS"
    secrets: inherit