name: Event Identification Service CI/CD Pipeline

on:
  workflow_dispatch:
    inputs:
      skip-approval:
        description: "Bypass manual approval"
        required: false
        default: "false"
  push:
    branches: ["master", "dev"]
    paths:
      - "event-identification-service/**"
      - "deploy/**"
      - "infra/**"
      - ".github/workflows/python-reusable-workflow.yaml"
  pull_request:
    branches: ["master", "dev"]
    paths:
      - "event-identification-service/**"
      - "deploy/**"
      - "infra/**"
      - ".github/workflows/python-reusable-workflow.yaml"
jobs:
  event-identification-workflow:
    uses: ./.github/workflows/python-reusable-workflow.yaml
    with:
      working-directory: "event-identification-service"
      cluster-name: "agentic-m-cluster"
      image-name: "event-identification-service"
      skip-approval: ${{ inputs.skip-approval || 'false' }}
      values-file: "deploy/prod/values-event-identification.yaml"
      secret-key: "EVENT_IDENTIFICATION_SECRETS"
    secrets: inherit