name: Trading Agent M CI

on:
  push:
    branches: ["master"]
    paths:
      - "trading-agent-m/**"
  pull_request:
    branches: ["master"]
    paths:
      - "trading-agent-m/**"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./trading-agent-m

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "trading-agent-m/requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check .
          ruff format --check .

      - name: Run dependent services
        run: docker compose up -d redis-stream qdrant-agent-m
        env:
          QDRANT_URL: http://localhost:8333
          REDIS_URL: redis://localhost:7380

      - name: Wait for services to be ready
        run: |
          echo "Waiting for Redis and Qdrant..."
          sleep 15

      - name: Populate Qdrant for tests
        run: python test_scripts/populate_qdrant.py
        env:
          QDRANT_URL: http://localhost:8333

      - name: Stop services
        if: always()
        run: docker compose down

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./trading-agent-m
          file: ./trading-agent-m/Dockerfile
          push: false # Only build, don't push
          tags: trading-agent-m:latest

  deploy-to-k8s:
    name: Deploy to Kubernetes (Trading Agent M)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: trading-agent-m
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create environment variable file from secret
        run: echo "${{ secrets.TRADING_AGENT_M_SECRETS }}" > .env.prod
        shell: bash

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and Push Docker Image
        run: make build

      - name: Setup Kubeconfig
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG_DATA }}

      - name: Deploy to Kubernetes
        run: make deploy
