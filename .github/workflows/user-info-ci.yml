name: User Info Service CI

on:
  push:
    branches: ["master"]
    paths:
      - "user-info/**"
  pull_request:
    branches: ["master"]
    paths:
      - "user-info/**"

jobs:
  go-tests:
    name: Build and Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: user-info

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go Environment
        uses: actions/setup-go@v4
        with:
          go-version: "1.25.x"
          cache: true
          cache-dependency-path: user-info/go.sum

      - name: Install dependencies
        run: go mod download

      - name: Run Unit Tests
        run: go test -v ./...

      - name: Verify Binary Compilation
        run: go build -v -o app ./cmd/main.go

  deploy-to-k8s:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: go-tests
    defaults:
      run:
        working-directory: user-info
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and Push Docker Image
        run: make build

      - name: Setup Kubeconfig
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG_DATA }}

      - name: Recreate .env file
        run: |
          echo "${{ secrets.USER_INFO_ENV_BASE_64 }}" | base64 --decode > .env

      - name: Deploy to Kubernetes
        run: make deploy
