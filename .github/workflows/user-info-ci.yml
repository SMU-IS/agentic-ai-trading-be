name: User Info Service CI

on:
  push:
    branches: ["master"]
    paths:
      - "user-info/**"
  pull_request:
    branches: ["master"]
    paths:
      - "user-info/**"

jobs:
  go-tests:
    name: Build and Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: user-info

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go Environment
        uses: actions/setup-go@v4
        with:
          go-version: "1.25.x"
          cache: true
          cache-dependency-path: user-info/go.sum

      - name: Install dependencies
        run: go mod download

      - name: Run Unit Tests
        run: go test -v ./...

      - name: Verify Binary Compilation
        run: go build -v -o app ./cmd/main.go
