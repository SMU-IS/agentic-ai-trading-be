services:
  user-info-db:
      image: postgres:16-alpine
      container_name: user-info-db
      restart: always
      env_file:
        - .env
      environment:
        - POSTGRES_USER=${POSTGRES_USER}
        - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
        - POSTGRES_DB=${POSTGRES_DB}
      ports:
        - "5433:5432"
      volumes:
        - postgres_data:/var/lib/postgresql/data
  user-info-service:
    build: .
    env_file:
      - .env
    depends_on:
      - user-info-db
    volumes:
      - ../certs:/certs
    container_name: user-module
    ports:
      - "5005:5005"
    environment:
      - HOST=${HOST}
      - DB_PORT=${DB_PORT}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - DB_SSL_MODE=${DB_SSL_MODE}
      - DB_SSL_ROOT_CERT=${DB_SSL_ROOT_CERT}
      - DB_TIMEZONE=${DB_TIMEZONE}
      - REDIS_ADDR=${REDIS_ADDR}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - CACHE_EXPIRATION_HOURS=${CACHE_EXPIRATION_HOURS}
      - JWT_SECRET=${JWT_SECRET}
      - PORT=${PORT}
      - JWT_EXPIRATION_HOURS=${JWT_EXPIRATION_HOURS}
      - X_KEY=${X_KEY}
      - X_SECRET=${X_SECRET}
      - X_CALL_BACK=${X_CALL_BACK}
      - X_REDIRECT_FRONTEND=${X_REDIRECT_FRONTEND}
    restart: unless-stopped

volumes:
  postgres_data: