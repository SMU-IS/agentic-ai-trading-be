services:
  rag-chatbot-service:
    build: .
    container_name: rag-agentic-app
    ports:
      - "5001:5001"
    volumes:
      - .:/code
    environment:
      - QDRANT_DB_NEWS_ANALYSIS=http://news-analysis-service:5002/query
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_S3_BUCKET_NAME=${AWS_S3_BUCKET_NAME}
      - AWS_S3_FILE_NAME=${AWS_S3_FILE_NAME}
    command: fastapi dev app/main.py --host 0.0.0.0 --port 5001
