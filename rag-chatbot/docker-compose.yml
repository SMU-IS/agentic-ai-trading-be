services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage:z
    restart: unless-stopped

  backend:
    build: .
    container_name: ai_agentic_app
    ports:
      - "8000:8000"
    volumes:
      - .:/code
    environment:
      - QDRANT_HOST=qdrant
    depends_on:
      - qdrant
    command: fastapi dev app/main.py --host 0.0.0.0 --port 8000
