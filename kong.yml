_format_version: "3.0"
_transform: true

plugins:
  - name: cors
    config:
      origins:
        - http://localhost:3000 # TODO: Add in production url
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - PATCH
        - OPTIONS
      headers:
        - Accept
        - Accept-Version
        - Content-Length
        - Content-MD5
        - Content-Type
        - Date
        - Authorization
      exposed_headers:
        - X-Auth-Token
      credentials: true
      max_age: 3600
      preflight_continue: false

services:
  # === News Analysis Microservice ===
  - name: news-analysis-entry
    url: http://news-analysis-service:5002
    routes:
      - name: news-analysis-routes
        paths:
          - /api/v1/news-analysis
        strip_path: true

  # === User Info Microservice ===
  - name: user-service-entry
    url: http://user-service:8080
    routes:
      - name: user-routes
        paths:
          - /api/v1/user
        strip_path: true

  # === RAG Chatbot Microservice ===
  - name: rag-chatbot-service-entry
    url: http://rag-chatbot-service:5001
    routes:
      - name: rag-chatbot-routes
        paths:
          - /api/v1/rag
        strip_path: true

  # === Trading Agent M Microservice ===
  - name: trading-agent-m-service-entry
    url: http://trading-agent-m-service:5003
    routes:
      - name: trading-agent-m
        paths:
          - /api/v1/agent-m
        strip_path: true

  # === Trading Service Microservice ===
  - name: trading-service-entry
    url: http://broker-service:9000
    routes:
      - name: trading-service-routes
        paths:
          - /api/v1/trading
        strip_path: true
