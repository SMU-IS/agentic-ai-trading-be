_format_version: "3.0"
_transform: true

plugins:
  - name: cors
    config:
      origins:
        - http://localhost:3000 # TODO: Add in production url
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - PATCH
        - OPTIONS
      headers:
        - Accept
        - Accept-Version
        - Content-Length
        - Content-MD5
        - Content-Type
        - Date
        - Authorization
      exposed_headers:
        - X-Auth-Token
      credentials: true
      max_age: 3600
      preflight_continue: false

services:
  # === User Info Microservice ===
  - name: user-service-entry
    url: http://user-service:8080
    routes:
      - name: user-routes
        paths:
          - /api/v1/user
        strip_path: true

  # === RAG Chatbot Microservice ===
  - name: rag-chatbot-service-entry
    url: http://rag-chatbot-service:5001
    routes:
      - name: rag-chatbot-routes
        paths:
          - /api/v1/rag
        strip_path: true
