_format_version: "3.0"
_transform: true

consumers:
  - username: agentic-ai-user-service
    jwt_secrets:
      - key: agentic-ai-user-service
        algorithm: HS256
        secret: L5TjuuTAlM8MMcZ9nyhB9QkLXxgyW8tGlPQc40rJcMt # TODO: remove hardcoded secret.

plugins:
  - name: cors
    config:
      origins:
        - http://localhost:3000
        - https://main.d3f0x7kvo77xiu.amplifyapp.com
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - PATCH
        - OPTIONS
      headers:
        - Accept
        - Accept-Version
        - Content-Length
        - Content-MD5
        - Content-Type
        - Date
        - Authorization
      exposed_headers:
        - X-Auth-Token
      credentials: true
      max_age: 3600
      preflight_continue: false

services:
  # === RAG Chatbot Microservice 5001 ===
  - name: rag-chatbot-service-entry
    url: http://rag-chatbot-service:5001
    # plugins:
    #   - name: jwt
    routes:
      - name: rag-chatbot-routes
        paths:
          - /api/v1/rag
        strip_path: true

  # === Preprocessing Microservice 5002 ===
  - name: preprocessing-entry
    url: http://preprocessing:5002
    routes:
      - name: preprocessing-routes
        paths:
          - /api/v1/preprocessing
        strip_path: true

  # === News Scraper Microservice 5003 ===
  - name: news-scraper-entry
    url: http://news-scraper-service:5003
    routes:
      - name: news-scraper-routes
        paths:
          - /api/v1/news-scraper
        strip_path: true

  # === Notification Microservice 5004 ===
  - name: notification-entry
    url: http://notification-service:5004
    routes:
      - name: notification-routes
        paths:
          - /api/v1/notification
        strip_path: true

  # === User Info Microservice 5005 ===
  - name: user-service-entry
    url: http://user-info-service:5005
    routes:
      - name: user-auth-routes
        paths:
          - /api/v1/auth
        strip_path: true

      - name: user-profile-routes
        paths:
          - /api/v1/user
        strip_path: true
        plugins:
          - name: jwt
            config:
              claims_to_verify:
                - exp
              secret_is_base64: false
              run_on_preflight: false
              header_names:
                - authorization

  # === Trading Agent M Microservice 5006 ===
  - name: trading-agent-m-service-entry
    url: http://trading-agent-m-service:5006
    routes:
      - name: trading-agent-m
        paths:
          - /api/v1/agent-m
        strip_path: true

  # === Trading Service Microservice 5007 ===
  - name: trading-service-entry
    url: http://broker-service:5007
    routes:
      - name: trading-service-routes
        paths:
          - /api/v1/trading
        strip_path: true

    # === News Aggregator Microservice 5008 ===
  - name: news-aggregator-entry
    url: http://news-aggregator:5008
    routes:
      - name: news-aggregator-routes
        paths:
          - /api/v1/news-aggregator
        strip_path: true

  # === Qdrant Retrieval Microservice 5009 ===
  - name: qdrant-retrieval-entry
    url: http://qdrant-retrieval:5009
    routes:
      - name: qdrant-retrieval-routes
        paths:
          - /api/v1/qdrant
        strip_path: true

  # === Ticker Identification Microservice 5010 ===
  - name: ticker-identification-entry
    url: http://ticker-identification:5010
    routes:
      - name: ticker-identification-routes
        paths:
          - /api/v1/ticker-identification
        strip_path: true

  # === Event Identification Microservice 5011 ===
  - name: event-identification-entry
    url: http://event-identification:5011
    routes:
      - name: event-identification-routes
        paths:
          - /api/v1/event-identification
        strip_path: true

  # === Sentiment Analysis Microservice 5012 ===
  - name: sentiment-analysis-entry
    url: http://sentiment-analysis:5012
    routes:
      - name: sentiment-analysis-routes
        paths:
