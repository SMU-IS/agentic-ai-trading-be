_format_version: "3.0"
_transform: true

consumers:
  - username: agentic-ai-user-service
    jwt_secrets:
      - key: agentic-ai-user-service
        algorithm: HS256
        secret: L5TjuuTAlM8MMcZ9nyhB9QkLXxgyW8tGlPQc40rJcMt # TODO: remove hardcoded secret.

plugins:
  - name: cors
    config:
      origins:
        - http://localhost:3000
        - https://main.d22zhvaaydu232.amplifyapp.com
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - PATCH
        - OPTIONS
      headers:
        - Accept
        - Accept-Version
        - Content-Length
        - Content-MD5
        - Content-Type
        - Date
        - Authorization
      exposed_headers:
        - X-Auth-Token
      credentials: true
      max_age: 3600
      preflight_continue: false

