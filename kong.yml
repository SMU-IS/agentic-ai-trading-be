_format_version: "3.0"
_transform: true

consumers:
  - username: agentic-ai-user-service
    jwt_secrets:
      - key: agentic-ai-user-service
        algorithm: HS256
        secret: L5TjuuTAlM8MMcZ9nyhB9QkLXxgyW8tGlPQc40rJcMt # TODO: Move to Vault/Env

plugins:
  - name: cors
    config:
      origins:
        - "http://localhost:3000"
        - "https://main.d3f0x7kvo77xiu.amplifyapp.com"
        - "https://agentic-m.com"
      methods: ["GET", "POST", "PUT", "DELETE", "PATCH", "OPTIONS"]
      headers:
        [
          "Accept",
          "Accept-Version",
          "Content-Length",
          "Content-MD5",
          "Content-Type",
          "Date",
          "Authorization",
          "X-Requested-With",
          "X-AUTH-TOKEN",
          "X-USER-ID",
        ]
      exposed_headers: ["X-Auth-Token"]
      credentials: true
      max_age: 3600
      preflight_continue: false
  - name: pre-function
    config:
      access:
        - |
          local jwt_decoder = require "kong.plugins.jwt.jwt_parser"
          local auth_header = kong.request.get_header("authorization")

          if auth_header then
            local token = auth_header:gsub("Bearer ", "")
            local jwt, err = jwt_decoder:new(token)

            if jwt and jwt.claims and jwt.claims.sub then
              kong.service.request.set_header("X-USER-ID", jwt.claims.sub)
            end
          end
  - name: rate-limiting
    config:
      minute: 100
      policy: local
  - name: prometheus

services:
  # --- RAG Chatbot (5001) ---
  - name: rag-chatbot-service
    url: http://rag-chatbot-infra:5001
    routes:
      - name: rag-healthcheck
        paths: ["/api/v1/rag/healthcheck"]
        strip_path: true
      - name: rag-protected
        paths: ["/api/v1/rag"]
        strip_path: true
        plugins:
          - name: jwt
            config:
              claims_to_verify: ["exp"]
              secret_is_base64: false

