replicaCount: 1

resources:
  requests:
    memory: "512Mi"
    cpu: "250m"
  limits:
    memory: "1Gi"
    cpu: "500m"

image:
  repository: 182138814885.dkr.ecr.us-east-1.amazonaws.com/preprocessing-service
  tag: v1
  pullPolicy: Always

service:
  type: ClusterIP
  port: 5002
  targetPort: 5002

startupProbe:
  httpGet:
    path: /
    port: 5002
  failureThreshold: 30
  periodSeconds: 10

livenessProbe:
  httpGet:
    path: /
    port: 5002
  initialDelaySeconds: 60

readinessProbe:
  httpGet:
    path: /
    port: 5002
  initialDelaySeconds: 30

worker:
  enabled: true
  replicaCount: 2
  command: ["python", "-m", "app.services.preprocessing_worker"]

secretName: preprocessing-service-secrets

ingress:
  enabled: true
  public:
    enabled: true
    paths:
      - path: /api/v1/preprocessing/healthcheck
        pathType: Exact
  protected:
    enabled: true
    paths:
      - path: /api/v1/preprocessing
        pathType: Prefix

