replicaCount: 1

resources:
  requests:
    memory: "128Mi"
    cpu: "50m"
  limits:
    memory: "256Mi"
    cpu: "100m"

image:
  repository: 182138814885.dkr.ecr.us-east-1.amazonaws.com/news-scraper
  tag: v1
  pullPolicy: Always

service:
  type: ClusterIP
  port: 5003
  targetPort: 5003

startupProbe:
  httpGet:
    path: /
    port: 5003
  failureThreshold: 30
  periodSeconds: 10

livenessProbe:
  httpGet:
    path: /
    port: 5003
  initialDelaySeconds: 60

readinessProbe:
  httpGet:
    path: /
    port: 5003
  initialDelaySeconds: 30

secretName: news-scraper-secrets

ingress:
  enabled: true
