apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: global-cors
  namespace: default
config:
  origins:
    - "http://localhost:3000"
    - "https://main.d22zhvaaydu232.amplifyapp.com"
  methods: ["GET", "POST", "OPTIONS"]
  headers: ["Content-Type", "Authorization"]
  credentials: true
plugin: cors

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: main-kong-gateway
  namespace: default
  annotations:
    konghq.com/publish-service: "kong/kong-gateway-proxy"
    konghq.com/strip-path: "true"
    konghq.com/plugins: "global-cors"
spec:
  ingressClassName: kong
  rules:
    - http:
        paths:
          - path: /api/v1/rag
            pathType: Prefix
            backend:
              service:
                name: rag-chatbot-infra
                port:
                  number: 5001
          - path: /api/v1/news-analysis
            pathType: Prefix
            backend:
              service:
                name: news-analysis-infra
                port:
                  number: 5002
          - path: /api/v1/news-scraper
            pathType: Prefix
            backend:
              service:
                name: news-scraper-infra
                port:
                  number: 5003
          - path: /api/v1/notification
            pathType: Prefix
            backend:
              service:
                name: notification-alert-infra
                port:
                  number: 5004
          - path: /api/v1/user
            pathType: Prefix
            backend:
              service:
                name: user-info-infra
                port:
                  number: 5005
          - path: /api/v1/agent-m
            pathType: Prefix
            backend:
              service:
                name: trading-agent-m-infra
                port:
                  number: 5006
          - path: /api/v1/trading
            pathType: Prefix
            backend:
              service:
                name: trading-service-infra
                port:
                  number: 5007
          - path: /api/v1/news-aggregator
            pathType: Prefix
            backend:
              service:
                name: news-aggregator-infra
                port:
                  number: 5008
          - path: /api/v1/qdrant
            pathType: Prefix
            backend:
              service:
                name: qdrant-infra
                port:
                  number: 5009
