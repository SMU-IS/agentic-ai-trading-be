# Secret for JWT Authentication
apiVersion: v1
kind: Secret
metadata:
  name: agentic-ai-jwt-secret
  namespace: default
  labels:
    konghq.com/credential: jwt
type: Opaque
stringData:
  kongCredType: jwt
  key: agentic-ai-user-service
  algorithm: HS256
  secret: L5TjuuTAlM8MMcZ9nyhB9QkLXxgyW8tGlPQc40rJcMt # TODO: Move to a Secret Provider/Vault

---
# JWT Plugin Configuration
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: jwt-auth
  namespace: default
  annotations:
    kubernetes.io/ingress.class: "kong"
config:
  claims_to_verify:
    - exp
  secret_is_base64: false
  header_names:
    - authorization
plugin: jwt

---
# Global CORS Plugin Configuration
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: global-cors
  namespace: default
config:
  origins:
    - "http://localhost:3000"
    - "https://main.d3f0x7kvo77xiu.amplifyapp.com"
    - "https://agentic-m.com"
  methods: ["GET", "POST", "PUT", "DELETE", "PATCH", "OPTIONS"]
  headers:
    [
      "Accept",
      "Accept-Version",
      "Content-Length",
      "Content-MD5",
      "Content-Type",
      "Date",
      "Authorization",
      "X-Requested-With",
      "X-Auth-Token",
    ]
  exposed_headers: ["X-Auth-Token"]
  credentials: true
  max_age: 3600
  preflight_continue: false
plugin: cors

---
# === 2. CONSUMERS ===
apiVersion: configuration.konghq.com/v1
kind: KongConsumer
metadata:
  name: agentic-ai-user-service
  namespace: default
  annotations:
    kubernetes.io/ingress.class: "kong"
username: agentic-ai-user-service
credentials:
  - agentic-ai-jwt-secret

---
# === 3. PUBLIC ROUTES (CORS ONLY) ===
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: public-routes-gateway
  namespace: default
  annotations:
    konghq.com/strip-path: "true"
    konghq.com/plugins: "global-cors"
spec:
  ingressClassName: kong
  rules:
    - http:
        paths:
          - path: /api/v1/rag/healthcheck
            pathType: Exact
            backend:
              service: { name: rag-chatbot-infra, port: { number: 5001 } }

          - path: /api/v1/preprocessing/healthcheck
            pathType: Exact
            backend:
              service: { name: preprocessing-service-infra, port: { number: 5002 } }

          - path: /api/v1/news-scraper/healthcheck
            pathType: Exact
            backend:
              service: { name: news-scraper-infra, port: { number: 5003 } }

          - path: /api/v1/notification/healthcheck
            pathType: Exact
            backend:
              service: { name: notification-alert-infra, port: { number: 5004 } }

          - path: /api/v1/auth/healthcheck
            pathType: Exact
            backend:
              service: { name: user-info-infra, port: { number: 5005 } }

          - path: /api/v1/agent-m/healthcheck
            pathType: Exact
            backend:
              service: { name: trading-agent-m-infra, port: { number: 5006 } }

          - path: /api/v1/trading/healthcheck
            pathType: Exact
            backend:
              service: { name: trading-service-infra, port: { number: 5007 } }

          - path: /api/v1/news-aggregator/healthcheck
            pathType: Exact
            backend:
              service: { name: news-aggregator-service-infra, port: { number: 5008 } }

          - path: /api/v1/qdrant/healthcheck
            pathType: Exact
            backend:
              service: { name: qdrant-retrieval-infra, port: { number: 5009 } }

          - path: /api/v1/ticker-identification/healthcheck
            pathType: Exact
            backend:
              service: { name: ticker-identification-service-infra, port: { number: 5010 } }

          - path: /api/v1/event-identification/healthcheck
            pathType: Exact
            backend:
              service: { name: event-identification-service-infra, port: { number: 5011 } }

          - path: /api/v1/sentiment-analysis/healthcheck
            pathType: Exact
            backend:
              service: { name: sentiment-analysis-service-infra, port: { number: 5012 } }

          - path: /api/v1/news-scraper-tradingview/healthcheck
            pathType: Exact
            backend:
              service: { name: news-scraper-tradingview-service, port: { number: 5013 } }

          - path: /api/v1/metrics/healthcheck
            pathType: Exact
            backend:
              service: { name: metrics-tracker, port: { number: 5014 } }

          - path: /api/v1/metrics
            pathType: Prefix
            backend:
              service: { name: metrics-tracker, port: { number: 5014 } }

---
# === 4. PROTECTED ROUTES (CORS + JWT) ===
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: protected-routes-gateway
  namespace: default
  annotations:
    konghq.com/strip-path: "true"
    konghq.com/plugins: "global-cors, jwt-auth"
spec:
  ingressClassName: kong
  rules:
    - http:
        paths:
          - path: /api/v1/rag
            pathType: Prefix
            backend:
              service: { name: rag-chatbot-infra, port: { number: 5001 } }
          - path: /api/v1/user
            pathType: Prefix
            backend:
              service: { name: user-info-infra, port: { number: 5005 } }
          - path: /api/v1/trading
            pathType: Prefix
            backend:
              service: { name: trading-service-infra, port: { number: 5007 } }
          - path: /api/v1/qdrant
            pathType: Prefix
            backend:
              service: { name: qdrant-retrieval-infra, port: { number: 5009 } }
