apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: global-cors
  namespace: default
config:
  origins:
    - "http://localhost:3000"
    - "https://d3e8bz2bnxvara.cloudfront.net"
  methods: ["GET", "POST", "PUT", "DELETE", "PATCH", "OPTIONS"]
  headers: ["Accept", "Accept-Version", "Content-Length", "Content-MD5", "Content-Type", "Date", "Authorization"]
  exposed_headers: ["X-Auth-Token"]
  credentials: true
plugin: cors

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: main-kong-gateway
  namespace: default
  annotations:
    konghq.com/publish-service: "kong/kong-gateway-proxy"
    konghq.com/strip-path: "true"
    konghq.com/plugins: "global-cors"
spec:
  ingressClassName: kong
  rules:
    - http:
        paths:
          - path: /api/v1/rag
            pathType: Prefix
            backend:
              service:
                name: rag-chatbot-infra
                port:
                  number: 5001
          - path: /api/v1/preprocessing
            pathType: Prefix
            backend:
              service:
                name: preprocessing-service-infra
                port:
                  number: 5002
          - path: /api/v1/news-scraper
            pathType: Prefix
            backend:
              service:
                name: news-scraper-infra
                port:
                  number: 5003
          - path: /api/v1/notification
            pathType: Prefix
            backend:
              service:
                name: notification-alert-infra
                port:
                  number: 5004
          - path: /api/v1/auth
            pathType: Prefix
            backend:
              service:
                name: user-info-infra
                port:
                  number: 5005
          - path: /api/v1/user
            pathType: Prefix
            backend:
              service:
                name: user-info-infra
                port:
                  number: 5005
          - path: /api/v1/agent-m
            pathType: Prefix
            backend:
              service:
                name: trading-agent-m-infra
                port:
                  number: 5006
          - path: /api/v1/trading
            pathType: Prefix
            backend:
              service:
                name: trading-service-infra
                port:
                  number: 5007
          - path: /api/v1/news-aggregator
            pathType: Prefix
            backend:
              service:
                name: news-aggregator-service-infra
                port:
                  number: 5008
          - path: /api/v1/qdrant
            pathType: Prefix
            backend:
              service:
                name: qdrant-retrieval-infra
                port:
                  number: 5009
          - path: /api/v1/ticker-identification
            pathType: Prefix
            backend:
              service:
                name: ticker-identification-service-infra
                port:
                  number: 5010
          - path: /api/v1/event-identification
            pathType: Prefix
            backend:
              service:
                name: event-identification-service-infra
                port:
                  number: 5011
          - path: /api/v1/sentiment-analysis
            pathType: Prefix
            backend:
              service:
                name: sentiment-analysis-service-infra
                port:
                  number: 5012
