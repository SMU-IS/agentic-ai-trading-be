# JWT Plugin Configuration
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: jwt-auth
  namespace: default
  annotations:
    kubernetes.io/ingress.class: "kong"
config:
  claims_to_verify:
    - exp
  secret_is_base64: false
  key_claim_name: iss
  header_names:
    - authorization
plugin: jwt

---
# Global CORS Plugin Configuration
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: global-cors
  namespace: default
config:
  origins:
    - "http://localhost:3000"
    - "https://main.d3f0x7kvo77xiu.amplifyapp.com"
    - "https://agentic-m.com"
  methods: ["GET", "POST", "PUT", "DELETE", "PATCH", "OPTIONS"]
  headers:
    [
      "Accept",
      "Accept-Version",
      "Content-Length",
      "Content-MD5",
      "Content-Type",
      "Date",
      "Authorization",
      "X-Requested-With",
      "X-Auth-Token",
    ]
  exposed_headers: ["X-Auth-Token"]
  credentials: true
  max_age: 3600
  preflight_continue: false
plugin: cors

---
# === 2. CONSUMERS ===
apiVersion: configuration.konghq.com/v1
kind: KongConsumer
metadata:
  name: agentic-ai-user-service
  namespace: default
  annotations:
    kubernetes.io/ingress.class: "kong"
username: agentic-ai-user-service
credentials:
  - agentic-ai-jwt-secret

---
# === 3. ADDITIONAL UTILITY PLUGINS ===

# Inject User ID from JWT Claim
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: inject-user-id
  namespace: default
config:
  add:
    headers:
      - X-User-Id:$(jwt_claims['sub'])
plugin: request-transformer

---
# JWT ID Extractor (Custom Logic)
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: jwt-id-extractor
  namespace: default
config:
  access:
    - |
      local jwt_decoder = require "kong.plugins.jwt.jwt_parser"
      local auth_header = kong.request.get_header("authorization")
      if auth_header then
        local token = auth_header:gsub("Bearer ", "")
        local jwt, err = jwt_decoder:new(token)
        if jwt and jwt.claims then
          kong.service.request.set_header("X-User-Id", jwt.claims.sub)
        end
      end
plugin: pre-function

---
# Map Consumer Username to X-User-Id Header
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: map-user-id-header
  namespace: default
config:
  add:
    headers:
      - x-user-id:$(headers['x-consumer-username'])
plugin: request-transformer

---
# Welcome Message Plugin
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: welcome-message
  namespace: default
config:
  status_code: 200
  body: '{"message": "⚡ Agent M Production APIs"}'
  content_type: application/json
plugin: request-termination
