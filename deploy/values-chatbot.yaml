replicaCount: 1

image:
  repository: 182138814885.dkr.ecr.us-east-1.amazonaws.com/rag-chatbot
  tag: v1
  pullPolicy: Always

service:
  type: ClusterIP
  port: 5001
  targetPort: 5001

startupProbe:
  httpGet:
    path: /
    port: 5001
  failureThreshold: 30
  periodSeconds: 10

livenessProbe:
  httpGet:
    path: /
    port: 5001
  initialDelaySeconds: 10
  periodSeconds: 20

readinessProbe:
  httpGet:
    path: /
    port: 5001
  initialDelaySeconds: 5
  periodSeconds: 10

secretName: rag-chatbot-secrets

ingress:
  enabled: true
