replicaCount: 2

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "250m"
    memory: "512Mi"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

image:
  repository: 182138814885.dkr.ecr.us-east-1.amazonaws.com/rag-chatbot
  tag: v1
  pullPolicy: Always

service:
  type: ClusterIP
  port: 5001
  targetPort: 5001

startupProbe:
  httpGet:
    path: /
    port: 5001
  failureThreshold: 30
  periodSeconds: 10
  timeoutSeconds: 5

livenessProbe:
  httpGet:
    path: /
    port: 5001
  initialDelaySeconds: 10
  periodSeconds: 20
  timeoutSeconds: 5

readinessProbe:
  httpGet:
    path: /
    port: 5001
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5

podAnnotations:
  # prometheus.io/scrape: "true"
  # prometheus.io/port: "5001"
  # prometheus.io/path: "/metrics"

secretName: rag-chatbot-secrets

ingress:
  enabled: true
  public:
    enabled: true
    paths:
      - path: /api/v1/rag/healthcheck
        pathType: Exact
  protected:
    enabled: true
    paths:
      - path: /api/v1/rag
        pathType: Prefix
