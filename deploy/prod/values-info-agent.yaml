replicaCount: 2

resources:
  requests:
    cpu: "50m"
    memory: "256Mi"
  limits:
    cpu: "200m"
    memory: "512Mi"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

image:
  repository: 182138814885.dkr.ecr.us-east-1.amazonaws.com/info-agent-service
  tag: v1
  pullPolicy: Always

service:
  type: ClusterIP
  port: 5015
  targetPort: 5015

startupProbe:
  timeoutSeconds: 5
  httpGet:
    path: /
    port: 5015
  failureThreshold: 30
  periodSeconds: 10

livenessProbe:
  timeoutSeconds: 5
  httpGet:
    path: /
    port: 5015
  initialDelaySeconds: 10
  periodSeconds: 20

readinessProbe:
  timeoutSeconds: 5
  httpGet:
    path: /
    port: 5015
  initialDelaySeconds: 5
  periodSeconds: 10

secretName: info-agent-service-secrets

ingress:
  enabled: true
  annotations:
    konghq.com/plugins: "global-cors, rate-limit"
  public:
    enabled: true
    paths:
      - path: /api/v1/info-agent/healthcheck
        pathType: Exact
      - path: /api/v1/info-agent
        pathType: Prefix
  protected:
    enabled: false
    paths: []
