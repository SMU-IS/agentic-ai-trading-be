replicaCount: 1

resources:
  requests:
    cpu: "50m"
    memory: "192Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70

image:
  repository: 182138814885.dkr.ecr.us-east-1.amazonaws.com/user-info
  tag: v1
  pullPolicy: Always

volumeMounts:
  - name: rds-cert-volume
    mountPath: /certs
    readOnly: true

volumes:
  - name: rds-cert-volume
    configMap:
      name: rds-certs

service:
  type: ClusterIP
  port: 5005
  targetPort: 5005

livenessProbe:
  timeoutSeconds: 5
  httpGet:
    path: /
    port: 5005
  initialDelaySeconds: 60
readinessProbe:
  timeoutSeconds: 5
  httpGet:
    path: /
    port: 5005
  initialDelaySeconds: 30

secretName: user-info-secrets

ingress:
  enabled: true
  public:
    enabled: true
    paths:
      - path: /api/v1/auth
        pathType: Prefix
      - path: /api/v1/user/healthcheck
        pathType: Exact
  protected:
    enabled: true
    paths:
      - path: /api/v1/user
        pathType: Prefix
