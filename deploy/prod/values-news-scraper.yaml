replicaCount: 1

resources:
  requests:
    cpu: "50m"
    memory: "192Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70

image:
  repository: 182138814885.dkr.ecr.us-east-1.amazonaws.com/news-scraper
  tag: v1
  pullPolicy: Always

service:
  type: ClusterIP
  port: 5003
  targetPort: 5003

startupProbe:
  timeoutSeconds: 5
  httpGet:
    path: /
    port: 5003
  failureThreshold: 30
  periodSeconds: 10

livenessProbe:
  timeoutSeconds: 5
  httpGet:
    path: /
    port: 5003
  initialDelaySeconds: 60

readinessProbe:
  timeoutSeconds: 5
  httpGet:
    path: /
    port: 5003
  initialDelaySeconds: 30

secretName: news-scraper-secrets

ingress:
  enabled: true
  public:
    enabled: true
    paths:
      - path: /api/v1/news-scraper/healthcheck
        pathType: Exact
  protected:
    enabled: true
    paths:
      - path: /api/v1/news-scraper
        pathType: Prefix

