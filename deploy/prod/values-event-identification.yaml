replicaCount: 1

resources:
  requests:
    cpu: 50m
    memory: 192Mi
  limits:
    cpu: 200m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

image:
  repository: 182138814885.dkr.ecr.us-east-1.amazonaws.com/event-identification-service
  tag: v1
  pullPolicy: Always

service:
  type: ClusterIP
  port: 5011
  targetPort: 5011

startupProbe:
  timeoutSeconds: 5
  httpGet:
    path: /
    port: 5011
  failureThreshold: 30
  periodSeconds: 10

livenessProbe:
  timeoutSeconds: 5
  httpGet:
    path: /
    port: 5011
  initialDelaySeconds: 60

readinessProbe:
  timeoutSeconds: 5
  httpGet:
    path: /
    port: 5011
  initialDelaySeconds: 30

worker:
  enabled: true
  replicaCount: 1
  resources:
    requests:
      cpu: "50m"
      memory: "192Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
  command: ["python", "-m", "app.services.event_identification_worker"]

secretName: event-identification-service-secrets

ingress:
  enabled: true
  public:
    enabled: true
    paths:
      - path: /api/v1/event-identification/healthcheck
        pathType: Exact
  protected:
    enabled: true
    paths:
      - path: /api/v1/event-identification
        pathType: Prefix
