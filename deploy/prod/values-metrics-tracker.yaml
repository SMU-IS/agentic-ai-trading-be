replicaCount: 2

resources:
  requests:
    cpu: "50m"
    memory: "128Mi"
  limits:
    cpu: "100m"
    memory: "256Mi"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 80

image:
  repository: 182138814885.dkr.ecr.us-east-1.amazonaws.com/metrics-tracker-service
  tag: v1
  pullPolicy: Always

service:
  type: ClusterIP
  port: 5014
  targetPort: 5014

startupProbe:
  httpGet:
    path: /
    port: 5014
  failureThreshold: 30
  periodSeconds: 10

livenessProbe:
  httpGet:
    path: /
    port: 5014
  initialDelaySeconds: 10
  periodSeconds: 20

readinessProbe:
  httpGet:
    path: /
    port: 5014
  initialDelaySeconds: 5
  periodSeconds: 10

secretName: metrics-tracker-service-secrets

ingress:
  enabled: true
  public:
    enabled: true
    paths:
      - path: /api/v1/metrics/healthcheck
        pathType: Exact
      - path: /api/v1/metrics
        pathType: Prefix
  protected:
    enabled: false
    paths: []

