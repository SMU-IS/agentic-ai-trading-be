replicaCount: 1

resources:
  requests:
    cpu: 10m
    memory: 192Mi
  limits:
    cpu: 200m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

image:
  repository: 182138814885.dkr.ecr.us-east-1.amazonaws.com/qdrant-retrieval
  tag: v1
  pullPolicy: Always

service:
  type: ClusterIP
  port: 5009
  targetPort: 5009

startupProbe:
  timeoutSeconds: 5
  httpGet:
    path: /
    port: 5009
  failureThreshold: 30
  periodSeconds: 10

livenessProbe:
  timeoutSeconds: 5
  httpGet:
    path: /
    port: 5009
  initialDelaySeconds: 10
  periodSeconds: 20

readinessProbe:
  timeoutSeconds: 5
  httpGet:
    path: /
    port: 5009
  initialDelaySeconds: 5
  periodSeconds: 10

worker:
  enabled: true
  replicaCount: 1
  resources:
    requests:
      cpu: "50m"
      memory: "192Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
  command: ["python", "-m", "app.services.qdrant_vectorisation_worker"]

secretName: qdrant-retrieval-secrets

ingress:
  enabled: true
  public:
    enabled: true
    paths:
      - path: /api/v1/qdrant/healthcheck
        pathType: Exact
  protected:
    enabled: true
    paths:
      - path: /api/v1/qdrant
        pathType: Prefix
