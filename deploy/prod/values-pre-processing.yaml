replicaCount: 2

resources:
  requests:
    cpu: "50m"
    memory: "64Mi"
  limits:
    cpu: "100m"
    memory: "128Mi"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

image:
  repository: 182138814885.dkr.ecr.us-east-1.amazonaws.com/preprocessing-service
  tag: v1
  pullPolicy: Always

service:
  type: ClusterIP
  port: 5002
  targetPort: 5002

startupProbe:
  timeoutSeconds: 5
  httpGet:
    path: /
    port: 5002
  failureThreshold: 30
  periodSeconds: 10

livenessProbe:
  timeoutSeconds: 5
  httpGet:
    path: /
    port: 5002
  initialDelaySeconds: 60

readinessProbe:
  timeoutSeconds: 5
  httpGet:
    path: /
    port: 5002
  initialDelaySeconds: 30

worker:
  enabled: true
  replicaCount: 2
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
  command: ["python", "-m", "app.services.preprocessing_worker"]

secretName: preprocessing-service-secrets

ingress:
  enabled: true
  public:
    enabled: true
    paths:
      - path: /api/v1/preprocessing/healthcheck
        pathType: Exact
  protected:
    enabled: true
    paths:
      - path: /api/v1/preprocessing
        pathType: Prefix

