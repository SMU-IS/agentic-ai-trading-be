replicaCount: 2

resources:
  requests:
    memory: "1Gi"
    cpu: "250m"
  limits:
    memory: "2Gi"
    cpu: "500m"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

image:
  repository: 182138814885.dkr.ecr.us-east-1.amazonaws.com/preprocessing-service
  tag: v1
  pullPolicy: Always

service:
  type: ClusterIP
  port: 5002
  targetPort: 5002

startupProbe:
  httpGet:
    path: /
    port: 5002
  failureThreshold: 30
  periodSeconds: 10

livenessProbe:
  httpGet:
    path: /
    port: 5002
  initialDelaySeconds: 60

readinessProbe:
  httpGet:
    path: /
    port: 5002
  initialDelaySeconds: 30

worker:
  enabled: true
  replicaCount: 2
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
  command: ["python", "-m", "app.services.preprocessing_worker"]
  resources:
    requests:
      cpu: "250m"
      memory: "1Gi"
    limits:
      cpu: "500m"
      memory: "2Gi"

secretName: preprocessing-service-secrets

ingress:
  host: api.agentic-m.com
  enabled: true
  public:
    enabled: true
    paths:
      - path: /api/v1/preprocessing/healthcheck
        pathType: Exact
  protected:
    enabled: true
    paths:
      - path: /api/v1/preprocessing
        pathType: Prefix

