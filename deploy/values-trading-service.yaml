replicaCount: 1

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "250m"

image:
  repository: 182138814885.dkr.ecr.us-east-1.amazonaws.com/trading-service
  tag: v1
  pullPolicy: Always

service:
  type: ClusterIP
  port: 5007
  targetPort: 5007

livenessProbe:
  httpGet:
    path: /
    port: 5007
  initialDelaySeconds: 60
readinessProbe:
  httpGet:
    path: /
    port: 5007
  initialDelaySeconds: 30

secretName: trading-service-secrets
