replicaCount: 3

image:
  repository: 182138814885.dkr.ecr.us-east-1.amazonaws.com/trading-service
  tag: v1
  pullPolicy: Always

volumeMounts:
  - name: rds-cert-volume
    mountPath: /certs
    readOnly: true

volumes:
  - name: rds-cert-volume
    configMap:
      name: rds-certs

service:
  type: ClusterIP
  port: 9000
  targetPort: 9000

livenessProbe:
  httpGet:
    path: /healthcheck
    port: 9000
  initialDelaySeconds: 60
readinessProbe:
  httpGet:
    path: /healthcheck
    port: 9000
  initialDelaySeconds: 30

secretName: trading-service-secrets
