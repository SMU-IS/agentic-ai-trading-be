services:
  # === Kong Gateway ===
  kong:
    image: kong:3.4
    container_name: kong-gateway
    environment:
      - KONG_DATABASE=off
      - KONG_DECLARATIVE_CONFIG=/usr/local/kong/declarative/kong.yml
      - KONG_PROXY_ACCESS_LOG=/dev/stdout
      - KONG_ADMIN_ACCESS_LOG=/dev/stdout
      - KONG_PROXY_ERROR_LOG=/dev/stderr
      - KONG_ADMIN_ERROR_LOG=/dev/stderr
      - KONG_ADMIN_LISTEN=0.0.0.0:8001
      - KONG_PROXY_LISTEN=0.0.0.0:8000
    volumes:
      - ./kong.yml:/usr/local/kong/declarative/kong.yml
    ports:
      - "8000:8000" # Frontend port /8000
      - "8001:8001" # Admin port
    restart: always

include:
  # === News Scraper Microservice ===
  - path: ./news-scraper/docker-compose.yml
    env_file: ./news-scraper/.env
    project_directory: ./news-scraper

  # === News Analysis Microservice ===
  - path: ./news-analysis/docker-compose.yml
    env_file: ./news-analysis/.env
    project_directory: ./news-analysis

  # === User Info Microservice ===
  - path: ./user-info/docker-compose.yml
    env_file: ./user-info/.env
    project_directory: ./user-info

  # === RAG Chatbot Microservice ===
  - path: ./rag-chatbot/docker-compose.yml
    env_file: ./rag-chatbot/.env
    project_directory: ./rag-chatbot

  # === Trading Agent M Microservice ===
  - path: ./trading-agent-m/docker-compose.yml
    env_file: ./trading-agent-m/.env
    project_directory: ./trading-agent-m

  # === Trading Service Microservice ===
  - path: ./trading-service/docker-compose.yml
    env_file: ./trading-service/.env
    project_directory: ./trading-service

  # === Notification Alert Service Microservice ===
  - path: ./notification-alert/docker-compose.yml
    env_file: ./notification-alert/.env
    project_directory: ./notification-alert

  # === Trading Agent M Microservice ===
  - path: ./news-aggregator-service/docker-compose.yml
    env_file: ./news-aggregator-service/.env
    project_directory: ./news-aggregator-service
