{{- if .Values.ingress.enabled -}}
{{- if .Values.ingress.public.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "infra.fullname" . }}-public
  labels:
    {{- include "infra.labels" . | nindent 4 }}
  annotations:
    konghq.com/strip-path: "true"
    konghq.com/plugins: "global-cors"
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: kong
  rules:
    - http:
        paths:
          {{- range .Values.ingress.public.paths }}
          - path: {{ .path }}
            pathType: {{ .pathType | default "ImplementationSpecific" }}
            backend:
              service:
                name: {{ include "infra.fullname" $ }}
                port:
                  number: {{ $.Values.service.port }}
          {{- end }}
---
{{- end -}}

{{- if .Values.ingress.protected.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "infra.fullname" . }}-protected
  labels:
    {{- include "infra.labels" . | nindent 4 }}
  annotations:
    konghq.com/strip-path: "true"
    konghq.com/plugins: "global-cors, jwt-auth, inject-user-id"
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: kong
  rules:
    - http:
        paths:
          {{- range .Values.ingress.protected.paths }}
          - path: {{ .path }}
            pathType: {{ .pathType | default "ImplementationSpecific" }}
            backend:
              service:
                name: {{ include "infra.fullname" $ }}
                port:
                  number: {{ $.Values.service.port }}
          {{- end }}
{{- end -}}
{{- end -}}
