# 1. Chaos Engine for Scaling/Load Validation
apiVersion: litmuschaos.io/v1alpha1
kind: ChaosEngine
metadata:
  name: trading-service-stress
  namespace: default
spec:
  # It can be active/stop
  engineState: "active"
  # Reuse the existing service account with necessary RBAC
  chaosServiceAccount: pod-delete-sa
  jobCleanUpPolicy: "delete"
  appinfo:
    appns: 'default'
    applabel: 'app.kubernetes.io/instance=trading-service'
    appkind: 'deployment'
  experiments:
    - name: pod-cpu-hog
      spec:
        components:
          env:
            - name: TARGET_DEPLOYMENT
              value: 'trading-service-infra'
            # Duration: 5 minutes (provides time for HPA and Karpenter to trigger)
            - name: TOTAL_CHAOS_DURATION
              value: '300'
            # Consume 1 full core per targeted pod to force HPA trigger
            - name: CPU_CORES
              value: '1'
            # Target 1 of your 2 initial replicas
            - name: PODS_AFFECTED_PERC
              value: '50'
