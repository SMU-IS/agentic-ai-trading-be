services:
  redis-queue:
    image: redis:7-alpine
    container_name: redis-queue
    ports:
      - "6380:6379"
    restart: unless-stopped

  qdrant-db:
    image: qdrant/qdrant:latest
    container_name: qdrant-container
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage:z
    restart: unless-stopped

  news-analysis-service:
    build: .
    container_name: news-analysis-container
    ports:
      - "5002:5002"
    volumes:
      - .:/code
    environment:
      - QDRANT_HOST=qdrant
      - REDIS_URL=redis://redis:6379
      - REDIS_QUEUE_NAME=raw_news_queue
      - SENTIMENT_MODEL=ProsusAI/finbert
      - SENTIMENT_DEVICE=cpu  
    depends_on:
      - qdrant-db
      - redis-queue
    command: fastapi dev app/main.py --host 0.0.0.0 --port 5002
