services:
  news-analysis-service:
    build: .
    env_file:
      - .env
    container_name: news-analysis-container
    ports:
      - "5002:5002"
    volumes:
      - .:/code
    environment:
      - STORAGE_PROVIDER=${STORAGE_PROVIDER}
      - QDRANT_URL=${QDRANT_URL}
      - QDRANT_API_KEY=${QDRANT_API_KEY}
      - REDIS_URL=${REDIS_URL}
      - REDIS_QUEUE_NAME=${REDIS_QUEUE_NAME}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDDIT_CLIENT_ID=${REDDIT_CLIENT_ID}
      - REDDIT_CLIENT_SECRET=${REDDIT_CLIENT_SECRET}
      - REDDIT_USER_AGENT=${REDDIT_USER_AGENT}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - LARGE_LANGUAGE_MODEL_GEMINI=${LARGE_LANGUAGE_MODEL_GEMINI}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - LARGE_LANGUAGE_MODEL_LLAMA_LOCAL=${LARGE_LANGUAGE_MODEL_LLAMA_LOCAL}
      - LARGE_LANGUAGE_MODEL_LLAMA=${LARGE_LANGUAGE_MODEL_LLAMA}
      - TEXT_EMBEDDING_MODEL=${TEXT_EMBEDDING_MODEL}
      - AWS_BUCKET_ACCESS_KEY=${AWS_BUCKET_ACCESS_KEY}
      - AWS_BUCKET_SECRET=${AWS_BUCKET_SECRET}
      - AWS_REGION=${AWS_REGION}
      - AWS_BUCKET_NAME=${AWS_BUCKET_NAME}
      - REDDIT_STREAM=${REDDIT_STREAM}
      - PREPROC_STREAM=${PREPROC_STREAM}
      - TICKER_STREAM=${TICKER_STREAM}
      - EVENT_STREAM=${EVENT_STREAM}
      - CREDIBILITY_STREAM=${CREDIBILITY_STREAM}
      - SENTIMENT_STREAM=${SENTIMENT_STREAM}
      - CLEANED_KEY=${CLEANED_KEY}
      - ALIAS_KEY=${ALIAS_KEY}
      - EVENTS_KEY=${EVENTS_KEY}
      - REMOVED_KEY=${REMOVED_KEY}
      - TEMPERATURE=${TEMPERATURE}
      - MAX_COMPLETION_TOKEN=${MAX_COMPLETION_TOKEN}
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2}
      - LANGCHAIN_ENDPOINT=${LANGCHAIN_ENDPOINT}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY}
    # command: fastapi dev app/main.py --host 0.0.0.0 --port 5002
    command: >
      sh -c "python -m app.services.orchestration &
            fastapi dev app/main.py --host 0.0.0.0 --port 5002"
    restart: unless-stopped
