services:
  qdrant-db:
    image: qdrant/qdrant:latest
    container_name: qdrant-news-analysis
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage:z
    restart: unless-stopped

  news-analysis-service:
    build: .
    env_file:
      - .env
    container_name: news-analysis-container
    ports:
      - "5002:5002"
    volumes:
      - .:/code
    environment:
      - QDRANT_URL=${QDRANT_URL}
      - SENTIMENT_MODEL=${SENTIMENT_MODEL}
      - SENTIMENT_DEVICE=${SENTIMENT_DEVICE}
    depends_on:
      - qdrant-db
    command: fastapi dev app/main.py --host 0.0.0.0 --port 5002
