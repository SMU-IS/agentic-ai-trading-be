services:
  qdrant-retrieval:
    build: .
    env_file:
      - .env
    container_name: qdrant-retrieval-container
    dns:
      - 8.8.8.8
      - 8.8.4.4
    ports:
      - "5009:5009"
    volumes:
      - .:/code
    environment:
      - STORAGE_PROVIDER=${STORAGE_PROVIDER}
      - LLM_PROVIDER=${LLM_PROVIDER}
      - LARGE_LANGUAGE_MODEL=${LARGE_LANGUAGE_MODEL}
      - TEXT_EMBEDDING_MODEL=${TEXT_EMBEDDING_MODEL}
      - QDRANT_URL=${QDRANT_URL}
      - QDRANT_API_KEY=${QDRANT_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - SENTIMENT_STREAM=${SENTIMENT_STREAM}
      - AGGREGATOR_STREAM=${AGGREGATOR_STREAM}
      - NOMIC_API_KEY=${NOMIC_API_KEY}
    command: uvicorn app.main:app --host 0.0.0.0 --port 5009 
    restart: unless-stopped

  qdrant-vectorisation-worker:
    build: .
    container_name: qdrant-vectorisation-worker-container
    dns:
      - 8.8.8.8
      - 8.8.4.4
    env_file:
      - .env
    environment:
      - STORAGE_PROVIDER=${STORAGE_PROVIDER}
      - LLM_PROVIDER=${LLM_PROVIDER}
      - LARGE_LANGUAGE_MODEL=${LARGE_LANGUAGE_MODEL}
      - TEXT_EMBEDDING_MODEL=${TEXT_EMBEDDING_MODEL}
      - QDRANT_URL=${QDRANT_URL}
      - QDRANT_API_KEY=${QDRANT_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - SENTIMENT_STREAM=${SENTIMENT_STREAM}
      - AGGREGATOR_STREAM=${AGGREGATOR_STREAM}
      - NOMIC_API_KEY=${NOMIC_API_KEY}
    command: python -m app.services.qdrant_vectorisation_worker
    restart: unless-stopped